<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Modern Weather App with animated space background, geolocation, temperature conversion, and favorites management."
    />
    <meta
      name="keywords"
      content="Weather App, Weather Forecast, Temperature, Geolocation, Space Background"
    />
    <meta name="author" content="Emmanuel Wole" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1e1e2e" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Weather App - Modern Weather Forecast" />
    <meta
      property="og:description"
      content="Beautiful weather app with animated space background and advanced features."
    />
    <meta
      property="og:image"
      content="https://RavenGames.github.io/weather-app/images/preview.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="Weather App - Modern Weather Forecast"
    />
    <meta
      property="twitter:description"
      content="Beautiful weather app with animated space background and advanced features."
    />

    <title>Weather App - Modern Weather Forecast</title>

    <!-- Preload critical resources -->
    <link rel="preload" href="styles.css" as="style" />
    <link rel="preload" href="app.js" as="script" />

    <!-- Optimized Font Awesome loading -->
    <link
      rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      />
    </noscript>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Animated Space Background -->
    <canvas id="spaceCanvas"></canvas>

    <div class="container">
      <header>
        <h1>🌤️ Weather App</h1>
        <p>Know the weather before you go</p>
      </header>

      <div class="search-section">
        <div class="search-controls">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search city..."
            aria-label="Search for a city"
          />
          <button id="searchBtn" class="search-btn" aria-label="Search">
            <i class="fas fa-search"></i>
          </button>
          <button
            id="geolocationBtn"
            class="control-btn"
            title="Use current location"
            aria-label="Use current location"
          >
            <i class="fas fa-location-dot"></i>
          </button>
        </div>
        <div class="toolbar-buttons">
          <button
            id="tempToggleBtn"
            class="control-btn active"
            title="Toggle temperature unit"
            aria-label="Toggle temperature unit"
          >
            <i class="fas fa-thermometer-half"></i> °C
          </button>
          <button
            id="refreshBtn"
            class="control-btn"
            title="Refresh weather"
            aria-label="Refresh weather"
          >
            <i class="fas fa-sync-alt"></i>
          </button>
        </div>
      </div>

      <!-- Loading Spinner -->
      <div id="loadingSpinner" class="loading-spinner hidden">
        <div class="spinner"></div>
        <p>Loading weather...</p>
      </div>

      <div
        id="errorMessage"
        class="error-message"
        role="alert"
        aria-live="polite"
      ></div>

      <div id="weatherContainer" class="weather-container hidden">
        <div class="current-weather">
          <div class="location-header">
            <div class="location-info">
              <h2 id="cityName"></h2>
              <p id="currentDate"></p>
            </div>
            <button
              id="addFavoriteBtn"
              class="favorite-btn"
              onclick="saveFavorite()"
              aria-label="Add to favorites"
            >
              <i class="fas fa-heart"></i>
              Add to Favorites
            </button>
          </div>

          <div class="weather-main">
            <div class="temp-section">
              <img
                id="weatherIcon"
                src=""
                alt="Weather icon"
                class="weather-icon-large"
              />
              <div class="temp-display">
                <span id="temperature" class="temperature"></span>
                <span class="temp-unit">°C</span>
              </div>
            </div>

            <div class="weather-description">
              <p id="description"></p>
              <p id="feelsLike"></p>
            </div>
          </div>

          <div class="weather-details">
            <div class="detail-card">
              <i class="fas fa-droplets"></i>
              <p>Humidity</p>
              <span id="humidity"></span>
            </div>
            <div class="detail-card">
              <i class="fas fa-wind"></i>
              <p>Wind Speed</p>
              <span id="windSpeed"></span>
            </div>
            <div class="detail-card">
              <i class="fas fa-eye"></i>
              <p>Visibility</p>
              <span id="visibility"></span>
            </div>
            <div class="detail-card">
              <i class="fas fa-gauge"></i>
              <p>Pressure</p>
              <span id="pressure"></span>
            </div>
          </div>
        </div>

        <div class="hourly-section" id="hourlySection" style="display: none">
          <h3>Hourly Forecast</h3>
          <div class="hourly-cards" id="hourlyContainer"></div>
        </div>

        <div class="forecast-section">
          <h3>5-Day Forecast</h3>
          <div class="forecast-cards" id="forecastContainer"></div>
        </div>
      </div>

      <div class="favorites-section">
        <h3>Favorite Cities</h3>
        <div id="favoritesList" class="favorites-list"></div>
        <p id="noFavoritesMsg" class="no-favorites">
          No favorites yet. Search a city and add it!
        </p>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
      <i id="toastIcon" class="fas"></i>
      <span id="toastMessage"></span>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
